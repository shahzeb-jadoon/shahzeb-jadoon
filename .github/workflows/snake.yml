name: Generate contribution snake

on:
  schedule:
    # Re-render the snake every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:   # allow manual run from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake.svg (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # Publish to the 'output' branch with plain git (no third-party publish
      # action) so there's no Node.js-20 deprecation to worry about.
      - name: Publish snake to 'output' branch
        run: |
          cd dist
          touch .nojekyll
          git init -q
          git checkout -b output
          git add -A
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "chore: update contribution snake"
          git push -f \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:output
